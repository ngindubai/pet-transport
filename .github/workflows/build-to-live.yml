name: Production build to live branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pet-transport-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate source
        run: python scripts/validate_site.py

      - name: Rebuild internal link graph
        run: python rebuild_link_graph_v3.py

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build Hugo site
        run: |
          cd site
          hugo --gc --minify --cleanDestinationDir
        env:
          HUGO_ENVIRONMENT: production

      - name: Split sitemap
        run: python split_sitemap.py

      - name: Audit rendered site
        run: python scripts/audit_build.py

      - name: Publish built site to live branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/public
          publish_branch: live
          force_orphan: true
          commit_message: "Deploy: ${{ github.sha }}"
