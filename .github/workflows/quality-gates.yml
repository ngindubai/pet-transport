name: Quality gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate source
        run: python scripts/validate_site.py

      - name: Rebuild internal link graph
        run: python rebuild_link_graph_v3.py

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build Hugo site
        run: hugo --gc --minify --cleanDestinationDir --source site
        env:
          HUGO_ENVIRONMENT: production

      - name: Split sitemap
        run: python split_sitemap.py

      - name: Audit rendered site
        run: python scripts/audit_build.py
