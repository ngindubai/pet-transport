name: Build and Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build Hugo site
        run: |
          cd site
          hugo --gc --minify
        env:
          HUGO_ENVIRONMENT: production

      - name: Split sitemap
        run: python split_sitemap.py

      - name: Check if state file exists on server
        id: check_state
        continue-on-error: true
        run: |
          curl -s --ftp-pasv --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}//public_html/.ftp-deploy-sync-state.json" -o /dev/null
          echo "exists=$?" >> $GITHUB_OUTPUT

      - name: Generate and upload state file (first run only)
        if: steps.check_state.outcome == 'failure'
        run: |
          echo "No state file found on server. Generating from build output..."
          python generate_ftp_state.py site/public
          echo "Uploading state file to server..."
          curl -v --ftp-pasv --ftp-create-dirs --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -T "site/public/.ftp-deploy-sync-state.json" "ftp://${{ secrets.FTP_SERVER }}//public_html/.ftp-deploy-sync-state.json"
          echo "State file uploaded. FTP Deploy Action will now do incremental syncs."

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/public/
          server-dir: /public_html/
          dangerous-clean-slate: false
          security: loose
          port: 21
          timeout: 60000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
